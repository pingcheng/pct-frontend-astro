name: CI

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js 22.13.1
      uses: actions/setup-node@v4
      with:
        node-version: 22.13.1
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Run Unit Tests
      run: npm run test

    - name: Run Build
      env:
        PUBLIC_GA_MEASUREMENT_ID: G-TESTGA1234
      run: npm run build

    - name: Run Static Page Tests
      env:
        PUBLIC_GA_MEASUREMENT_ID: G-TESTGA1234
      run: npx vitest run -c vitest.e2e.config.ts

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run Browser Smoke Tests
      run: npx playwright test
